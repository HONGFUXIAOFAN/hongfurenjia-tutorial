<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>红福人家系列产品使用教程</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #e74c3c;
            --secondary: #2c3e50;
            --accent: #f39c12;
            --light: #ecf0f1;
            --dark: #34495e;
            --success: #27ae60;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #c0392b 0%, #e74c3c 50%, #c0392b 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 头部 */
        .header {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }

        .header h1 {
            color: #c0392b;
            font-size: 2.2rem;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header .subtitle {
            color: #7f8c8d;
            font-size: 1.1rem;
            margin-bottom: 20px;
        }

        /* 搜索框 */
        .search-section {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 300px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 16px 20px 16px 50px;
            font-size: 1.1rem;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(231,76,60,0.1);
        }

        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
        }

        /* 分类标签 */
        .category-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 20px;
        }

        .category-tab {
            padding: 8px 16px;
            border-radius: 20px;
            background: var(--light);
            color: var(--dark);
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            font-size: 0.95rem;
        }

        .category-tab:hover {
            background: #dfe6e9;
        }

        .category-tab.active {
            background: var(--primary);
            color: white;
        }

        .category-tab .count {
            background: rgba(255,255,255,0.3);
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 6px;
            font-size: 0.85rem;
        }

        .category-tab.active .count {
            background: rgba(255,255,255,0.25);
        }

        /* 统计信息 */
        .stats {
            display: flex;
            gap: 20px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .stat-item {
            background: linear-gradient(135deg, var(--primary), #c0392b);
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-item.secondary {
            background: linear-gradient(135deg, var(--secondary), #1a252f);
        }

        .stat-item.accent {
            background: linear-gradient(135deg, var(--accent), #d68910);
        }

        /* 产品卡片网格 */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 20px;
        }

        @media (max-width: 600px) {
            .products-grid {
                grid-template-columns: 1fr;
            }
        }

        /* 产品卡片 */
        .product-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.15);
        }

        .product-card.hidden {
            display: none;
        }

        .card-header {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
        }

        .card-header.malaxiangguo { background: linear-gradient(135deg, #e74c3c, #c0392b); color: white; }
        .card-header.kaoyu { background: linear-gradient(135deg, #f39c12, #d68910); color: white; }
        .card-header.zhi baoyu { background: linear-gradient(135deg, #9b59b6, #8e44ad); color: white; }
        .card-header.huoguo { background: linear-gradient(135deg, #e67e22, #d35400); color: white; }
        .card-header.xiaolongxia { background: linear-gradient(135deg, #e74c3c, #c0392b); color: white; }
        .card-header.yutiaoliao { background: linear-gradient(135deg, #3498db, #2980b9); color: white; }
        .card-header.luniang { background: linear-gradient(135deg, #1abc9c, #16a085); color: white; }
        .card-header.mbzhiwu { background: linear-gradient(135deg, #34495e, #2c3e50); color: white; }
        .card-header.qita { background: linear-gradient(135deg, #95a5a6, #7f8c8d); color: white; }

        .product-name {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .product-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            background: rgba(255,255,255,0.25);
        }

        .card-body {
            padding: 20px;
        }

        .dosage-info {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            padding: 14px 16px;
            border-radius: 10px;
            margin-bottom: 16px;
            border-left: 4px solid var(--accent);
        }

        .dosage-info strong {
            color: var(--secondary);
        }

        .steps-title {
            font-weight: 600;
            color: var(--secondary);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .steps-content {
            background: #fefefe;
            border: 1px solid #e8e8e8;
            border-radius: 10px;
            padding: 16px;
            font-size: 0.95rem;
            line-height: 1.8;
            color: #444;
        }

        .steps-content ol {
            padding-left: 20px;
        }

        .steps-content li {
            margin-bottom: 10px;
        }

        .steps-content strong {
            color: var(--primary);
        }

        .tips-box {
            background: linear-gradient(135deg, #fff9e6, #fff3cd);
            border: 1px solid #ffeeba;
            border-radius: 10px;
            padding: 14px;
            margin-top: 14px;
        }

        .tips-box .title {
            font-weight: 600;
            color: #856404;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tips-box ul {
            margin: 0;
            padding-left: 18px;
            color: #856404;
            font-size: 0.9rem;
        }

        .tips-box li {
            margin-bottom: 4px;
        }

        /* 无结果 */
        .no-results {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 16px;
            display: none;
        }

        .no-results.show {
            display: block;
        }

        .no-results .icon {
            font-size: 4rem;
            margin-bottom: 16px;
        }

        .no-results h3 {
            color: var(--secondary);
            margin-bottom: 8px;
        }

        .no-results p {
            color: #7f8c8d;
        }

        /* 弹窗详情 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 16px;
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            padding: 24px;
            background: linear-gradient(135deg, var(--primary), #c0392b);
            color: white;
            position: sticky;
            top: 0;
        }

        .modal-header h2 {
            margin-bottom: 4px;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .modal-body {
            padding: 24px;
        }

        /* 底部 */
        .footer {
            text-align: center;
            padding: 30px;
            color: #fecaca;
            opacity: 0.9;
        }

        /* 打印样式 */
        @media print {
            body {
                background: white;
                padding: 0;
            }
            .header, .product-card {
                box-shadow: none;
                page-break-inside: avoid;
            }
            .category-tabs, .search-section {
                display: none;
            }
        }
    </style>
</head>

        <!-- 头部 -->

                    火锅<span class="count">5</span>

                </div>
            </div>
        </div>

        <!-- 产品列表 -->
        <div class="products-grid" id="productsGrid">
            <!-- 产品卡片将通过 JavaScript 动态生成 -->
        </div>

        <!-- 无结果提示 -->
        <div class="no-results" id="noResults">
            <div class="icon">🔍</div>
            <h3>未找到匹配的产品</h3>
            <p>请尝试其他关键词或分类筛选</p>
        </div>

        <!-- 弹窗 -->
        <div class="modal" id="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <button class="modal-close" onclick="closeModal()">×</button>
                    <h2 id="modalTitle">产品名称</h2>
                    <p id="modalCategory">分类</p>
                </div>
                <div class="modal-body" id="modalBody">
                    <!-- 内容 -->
                </div>
            </div>
        </div>

        <div class="footer">
            <p>数据来源：产品操作明细表 | 最后更新：2026年4月</p>
        </div>
    </div>

        // 分类映射
        const categoryMapping = {
            'all': () => true,
            'kaoyu': p => p.name.includes('烤鱼'),
            'zhi baoyu': p => p.name.includes('纸包鱼'),
            'malaxiangguo': p => p.name.includes('麻辣香锅'),
            'huoguo': p => ['火锅', '美蛙', '串串', '钵钵'].some(w => p.name.includes(w)),
            'xiaolongxia': p => ['虾', '龙虾'].some(w => p.name.includes(w)),
            'yutiaoliao': p => ['酸菜鱼', '香水鱼', '藤椒鱼', '麻辣鱼', '红烧鱼'].some(w => p.name.includes(w)),
            'luniang': p => ['卤', '凉拌'].some(w => p.name.includes(w)),
            'mbzhiwu': p => ['冒菜', '麻辣烫'].some(w => p.name.includes(w)),
            'qita': p => {
                const categories = ['烤鱼', '纸包鱼', '麻辣香锅', '火锅', '虾', '龙虾', '鱼调料', '卤', '凉拌', '冒菜', '麻辣烫'];
                return !categories.some(c => p.name.includes(c));
            }
        };

        // 当前筛选状态
        let currentCategory = 'all';
        let searchQuery = '';

        // 渲染产品卡片
        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            const noResults = document.getElementById('noResults');
            const visibleCount = document.getElementById('visibleCount');

            let filtered = productsData.filter(p => {
                const matchCategory = categoryMapping[currentCategory](p);
                const matchSearch = searchQuery === '' ||
                    p.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    p.steps.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    p.dosage.toLowerCase().includes(searchQuery.toLowerCase());
                return matchCategory && matchSearch;
            });

            visibleCount.textContent = filtered.length;

            if (filtered.length === 0) {
                grid.innerHTML = '';
                noResults.classList.add('show');
                return;
            }

            noResults.classList.remove('show');
            grid.innerHTML = filtered.map(p => `
                <div class="product-card" data-category="${p.category}">
                    <div class="card-header ${p.category}">
                        <span class="product-name">${p.name}</span>
                        <span class="product-badge">${p.categoryName}</span>
                    </div>
                    <div class="card-body">
                        <div class="dosage-info">
                            <strong>📦 用量：</strong>${p.dosage}
                        </div>
                        <div class="steps-title">
                            📋 操作步骤
                        </div>
                        <div class="steps-content">
                            ${p.steps}
                        </div>
                        ${p.tips ? `
                        <div class="tips-box">
                            <div class="title">💡 温馨提示</div>
                            ${p.tips}
                        </div>
                        ` : ''}
                    </div>
                </div>
            `).join('');
        }

        // 搜索功能
        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderProducts();
        });

        // 分类切换
        document.getElementById('categoryTabs').addEventListener('click', (e) => {
            if (e.target.classList.contains('category-tab')) {
                document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');
                currentCategory = e.target.dataset.category;
                renderProducts();
            }
        });

        // 初始渲染
        renderProducts();
    </script>
